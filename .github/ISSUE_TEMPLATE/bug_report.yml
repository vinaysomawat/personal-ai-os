name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Module / area
      placeholder: e.g. Finance, Telegram bot, AI Gateway, Dashboard
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / logs / anything else
    validations:
      required: false
